root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server.exe"
  cmd = "go build -o ./tmp/server.exe ./cmd/server"
  delay = 500
  exclude_dir = ["tmp", "vendor", "uploads", "static", "docs"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go"]
  kill_delay = "200ms"
  send_interrupt = true
  stop_on_error = true
  log = "tmp/build-errors.log"

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = true

[screen]
  clear_on_rebuild = true
