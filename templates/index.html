<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1><a href="/">My Blog</a></h1>
    </header>
    <main>
        {{range .}}
        <article>
            <h2><a href="/post/{{.Slug}}">{{.Title}}</a></h2>
            <time>{{.CreatedAt.Format "January 2, 2006"}}</time>
        </article>
        {{else}}
        <p>No posts yet.</p>
        {{end}}
    </main>
</body>
</html>
